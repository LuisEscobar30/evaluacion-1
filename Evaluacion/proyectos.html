<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OBE SPA - Proyectos</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css"/>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="assets/css/ccs1.css"/>
  
  <style>
    /* Estilos base para la consistencia del diseño */
    .price-card {
      background: var(--card); border:1px solid var(--border);
      border-radius:6px; padding:32px 28px; text-align:center;
      transition: border-color .3s, box-shadow .3s, transform .3s;
      height:100%;
    }
    .price-card:hover { border-color:var(--orange); box-shadow:0 0 28px rgba(0,229,209,.14); transform:translateY(-6px); }
    .price-name { font-family:'Orbitron',sans-serif; font-size:.8rem; color:var(--orange); margin-bottom:14px; letter-spacing:.12em; }
    .price-amount { font-family:'Orbitron',sans-serif; font-size:2.8rem; font-weight:900; color:#e0f7f5; }
    .btn-anadir { margin-top: 20px; background-color: var(--orange) !important; color: var(--dark) !important; font-weight: bold; width: 100%; }
  </style>
</head>
<body>

<nav>
  <div class="nav-wrapper container nav-flex">
    <a href="index.html" class="brand-logo"><i class="material-icons">build</i> OBE SPA</a>
    <ul class="right hide-on-med-and-down">
      <li><a href="index.html">INICIO</a></li>
      <li class="active"><a href="proyectos.html">PROYECTOS</a></li>
      <li><a href="contacto.html">CONTACTO</a></li>
    </ul>
    <a href="#" data-target="mobile-menu" class="sidenav-trigger right"><i class="material-icons">menu</i></a>
  </div>
</nav>

<div class="page-banner">
  <div class="container">
    <p class="page-banner-label">// NUESTROS PROYECTOS</p>
    <h1 class="page-banner-title">Obras civiles <span class="accent">sin límites</span></h1>
  </div>
</div>

<main class="container" style="padding: 50px 0;">
  <div class="row">
    <div class="col s12 m4">
      <div class="price-card">
        <div class="price-name">PROYECTO MINERÍA A</div>
        <div class="price-amount">$500</div>
        <button class="btn btn-anadir" data-nombre="Proyecto Minería A" data-precio="500">Añadir al Carrito</button>
      </div>
    </div>

    <div class="col s12 m4">
      <div class="price-card">
        <div class="price-name">PROYECTO MINERÍA B</div>
        <div class="price-amount">$800</div>
        <button class="btn btn-anadir" data-nombre="Proyecto Minería B" data-precio="800">Añadir al Carrito</button>
      </div>
    </div>
  </div>
</main>

<div class="fixed-action-btn">
    <a class="btn-floating btn-large modal-trigger" href="#modal-carrito">
        <i class="large material-icons">shopping_cart</i>
        <span class="badge" id="contador-carrito">0</span>
    </a>
</div>

<div id="modal-carrito" class="modal">
    <div class="modal-content">
        <h4>Tu Cotización</h4>
        <ul class="collection" id="lista-carrito"></ul>
    </div>
    <div class="modal-footer">
        <a href="#!" class="modal-close waves-effect btn-flat">Cerrar</a>
    </div>
</div>

<footer>
  <div class="container">
    <p class="footer-copy">© 2026 OBE SPA · Proyecto FrontEnd</p>
  </div>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
<script src="assets/js/carrito.js"></script>
</body>
</html>
