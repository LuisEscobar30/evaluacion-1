  <style>
    .process-step {
      display: flex; gap: 22px; align-items: flex-start;
      margin-bottom: 36px; padding-bottom: 36px;
      border-bottom: 1px solid var(--border);
    }
    .process-step:last-child { border-bottom: none; margin-bottom: 0; }
    .step-num {
      font-family: 'Orbitron', sans-serif; font-size: 2rem;
      font-weight: 900; color: var(--cyan); opacity: .25;
      min-width: 48px; line-height: 1;
    }
    .step-title { font-family:'Orbitron',sans-serif; font-size:.9rem; color:#e0f7f5; margin-bottom:8px; }
    .step-desc  { color: rgba(224,247,245,.55); font-size:.95rem; line-height:1.7; }

    .tag-list { display:flex; flex-wrap:wrap; gap:8px; margin-top:14px; }
    .tag {
      font-family:'Orbitron',sans-serif; font-size:.55rem;
      letter-spacing:.1em; color:var(--cyan);
      background:rgba(0,229,209,.08); border:1px solid var(--border);
      border-radius:3px; padding:4px 10px;
    }

    .price-card {
      background: var(--card); border:1px solid var(--border);
      border-radius:6px; padding:32px 28px; text-align:center;
      transition: border-color .3s, box-shadow .3s, transform .3s;
      height:100%;
    }
    .price-card:hover {
      border-color:var(--cyan);
      box-shadow:0 0 28px rgba(0,229,209,.14);
      transform:translateY(-6px);
    }
    .price-card.featured {
      border-color: var(--cyan);
      box-shadow: 0 0 32px rgba(0,229,209,.2);
      position:relative; overflow:hidden;
    }
    .price-card.featured::before {
      content:'POPULAR';
      position:absolute; top:14px; right:-24px;
      background:var(--pink); color:#fff;
      font-family:'Orbitron',sans-serif; font-size:.5rem; letter-spacing:.15em;
      padding:4px 34px; transform:rotate(38deg);
    }
    .price-name { font-family:'Orbitron',sans-serif; font-size:.8rem; color:var(--cyan); margin-bottom:14px; letter-spacing:.12em; }
    .price-amount { font-family:'Orbitron',sans-serif; font-size:2.8rem; font-weight:900; color:#e0f7f5; }
    .price-period { font-size:.8rem; color:rgba(224,247,245,.4); margin-bottom:20px; }
    .price-features { list-style:none; text-align:left; margin:18px 0 24px; }
    .price-features li {
      font-size:.92rem; color:rgba(224,247,245,.6);
      padding:7px 0; border-bottom:1px solid var(--border);
      display:flex; align-items:center; gap:8px;
    }
    .price-features li i { color:var(--cyan); font-size:.95rem; }
  </style>
</head>
