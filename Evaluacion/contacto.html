<!DOCTYPE html>
<html lang="es">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <link rel="stylesheet" href="assets/css/estilos.css">
</head>

<body class="grey darken-3 white-text">

<header>
    <nav class="orange">
        <div class="nav-wrapper container">
            <ul class="left">
                <li class="menu-puro-css">
                    <a class="white-text" href="#!">
                        Menú <i class="material-icons right">arrow_drop_down</i>
                    </a>
                    <ul class="dropdown-content">
                        <li><a href="index.html">Inicio</a></li>
                        <li><a href="sobre-nosotros.html">Sobre Nosotros</a></li>
                        <li><a href="proyectos.html">Proyectos</a></li>
                        <li><a href="contacto.html">Contacto</a></li>
                        <li><a href="info-empresa.html">Info Empresa</a></li>
                    </ul>
                </li>
            </ul>
            <a href="index.html" class="brand-logo center">
                <img src="assets/imgs/logo-obe.png" alt="logo obe" height="60">
            </a>
        </div>
    </nav>
</header>

<main class="container">
    <section id="Contacto" class="section">
        <h4 class="center"><strong>Contacto</strong></h4>
        <p class="flow-text center-align">
            Envíanos tus dudas o cotiza tu proyecto con nosotros.
        </p>
        <div class="row">
            <form class="col s12 m8 offset-m2">
                <div class="row">
                    <div class="input-field col s12 m6">
                        <i class="material-icons prefix white-text">person</i>
                        <input id="nombre" type="text" class="validate white-text">
                        <label for="nombre" class="white-text">Nombre Completo</label>
                    </div>
                    <div class="input-field col s12 m6">
                        <i class="material-icons prefix white-text">email</i>
                        <input id="correo" type="email" class="validate white-text">
                        <label for="correo" class="white-text">Correo Electrónico</label>
                    </div>
                </div>
                <div class="row">
                    <div class="input-field col s12">
                        <i class="material-icons prefix white-text">mode_edit</i>
                        <textarea id="mensaje" class="materialize-textarea white-text"></textarea>
                        <label for="mensaje" class="white-text">Mensaje o Cotización</label>
                    </div>
                </div>
                <div class="center-align">
                    <button class="btn waves-effect waves-light orange" type="button">Enviar Mensaje
                        <i class="material-icons right white-text">send</i>
                    </button>
                </div>
            </form>
        </div>
    </section>
</main>

<footer class="page-footer grey darken-4">
    <div class="container center">
        <p>©2026 OBE SPA | Proyecto FrontEnd</p>
    </div>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
<script src="assets/js/main.js"></script>

</body>
</html>
